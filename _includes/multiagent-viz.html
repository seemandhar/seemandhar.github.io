<div id="autoresearch-section" style="margin: 30px 0;">
<h2 style="margin-bottom: 4px;">How Multi-Agent Systems Automate Research</h2>
<p style="margin-top: 0; color: #888; font-size: 0.95em;">Agents pass a research artifact around the loop — <strong>Literature → Hypothesis → Experiment → Validation</strong>. Every validated artifact becomes a new <em>discovery</em> in the knowledge core. Drag a stage to fling it; click one to launch a fresh research thread.</p>

<canvas id="ar-canvas" width="800" height="460" style="width: 100%; max-width: 800px; border-radius: 14px; cursor: grab; touch-action: none; display: block;"></canvas>
<div id="ar-tooltip" role="status" aria-live="polite" style="position: fixed; pointer-events: none; opacity: 0; transition: opacity 0.18s ease; background: rgba(15,23,42,0.94); color: #f8fafc; padding: 7px 11px; border-radius: 8px; font-size: 12.5px; line-height: 1.35; max-width: 220px; box-shadow: 0 8px 28px rgba(0,0,0,0.35); z-index: 1000;"></div>
</div>

<script>
(function() {
  const canvas = document.getElementById('ar-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('ar-tooltip');
  const W = 800, H = 460;
  const CX = W / 2, CY = H / 2 + 6;
  const RING = 150;            // radius of the stage ring
  const CORE_R = 46;           // knowledge-core radius

  const mq = window.matchMedia('(prefers-color-scheme: dark)');
  let isDark = mq.matches;
  mq.addEventListener('change', e => { isDark = e.matches; if (!animate) render(); });

  const rmq = window.matchMedia('(prefers-reduced-motion: reduce)');
  let animate = !rmq.matches;
  rmq.addEventListener('change', e => { animate = !e.matches; if (animate) loop(); else render(); });

  // --- crisp rendering on hi-dpi ---
  function fit() {
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  fit();

  // --- the four research agents / stages ---
  const STAGES = [
    { key: 'lit',  name: 'Literature',  color: '#3b82f6', role: 'Surveys prior work, extracts open gaps and unexplained phenomena.' },
    { key: 'hyp',  name: 'Hypothesis',  color: '#f59e0b', role: 'Proposes a novel, testable idea that could close the gap.' },
    { key: 'exp',  name: 'Experiment',  color: '#10b981', role: 'Designs and runs the experiment, gathering evidence.' },
    { key: 'val',  name: 'Validation',  color: '#8b5cf6', role: 'Critiques and verifies results; a passing artifact becomes a discovery.' },
  ];
  const N = STAGES.length;

  // node state: home position on ring + physics for drag/spring
  const nodes = STAGES.map((s, i) => {
    const a = -Math.PI / 2 + i * (Math.PI * 2 / N); // start at top, clockwise
    return { ...s, ha: a, hx: CX + Math.cos(a) * RING, hy: CY + Math.sin(a) * RING,
             x: CX + Math.cos(a) * RING, y: CY + Math.sin(a) * RING, vx: 0, vy: 0, r: 34 };
  });

  let packets = [];      // artifacts travelling the loop  { p: 0..N, color }
  let discoveries = [];  // settled results orbiting the core
  let flyers = [];       // discoveries flying from Validation into the core
  let dragging = null, dragDX = 0, dragDY = 0;
  let hoverNode = null;
  let time = 0, spawnT = 0, discCount = 0;

  const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  const lerp = (a, b, t) => a + (b - a) * t;
  const bg = () => isDark ? '#0f1424' : '#f6f8fc';
  const fg = () => isDark ? '#e2e8f0' : '#334155';
  const mut = () => isDark ? '#8899b3' : '#64748b';
  function withA(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  function lighten(hex, p) {
    const r = Math.min(255, parseInt(hex.slice(1,3),16)+p), g = Math.min(255, parseInt(hex.slice(3,5),16)+p), b = Math.min(255, parseInt(hex.slice(5,7),16)+p);
    return `rgb(${r},${g},${b})`;
  }

  function spawnPacket(seg) {
    packets.push({ p: seg === undefined ? 0 : seg, color: nodes[Math.floor(seg||0) % N].color });
  }

  // --- vector stage icons (drawn, never emoji) ---
  function icon(key, x, y, s, col) {
    ctx.save();
    ctx.translate(x, y);
    ctx.strokeStyle = col; ctx.fillStyle = col;
    ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    if (key === 'lit') {                 // stacked document with text lines
      ctx.strokeRect(-s*0.6, -s*0.75, s*1.2, s*1.5);
      for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(-s*0.35, i*s*0.4); ctx.lineTo(s*0.35, i*s*0.4); ctx.stroke(); }
    } else if (key === 'hyp') {          // spark / new idea
      ctx.beginPath(); ctx.arc(0, -s*0.15, s*0.42, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-s*0.22, s*0.55); ctx.lineTo(s*0.22, s*0.55); ctx.stroke();
      for (let k = 0; k < 4; k++) { const a = -Math.PI/2 + k*Math.PI/2; ctx.beginPath(); ctx.moveTo(Math.cos(a)*s*0.7, -s*0.15+Math.sin(a)*s*0.7); ctx.lineTo(Math.cos(a)*s*0.95, -s*0.15+Math.sin(a)*s*0.95); ctx.stroke(); }
    } else if (key === 'exp') {          // erlenmeyer flask
      ctx.beginPath();
      ctx.moveTo(-s*0.22, -s*0.6); ctx.lineTo(-s*0.22, -s*0.15); ctx.lineTo(-s*0.6, s*0.6);
      ctx.lineTo(s*0.6, s*0.6); ctx.lineTo(s*0.22, -s*0.15); ctx.lineTo(s*0.22, -s*0.6);
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-s*0.32, -s*0.6); ctx.lineTo(s*0.32, -s*0.6); ctx.stroke();
      ctx.globalAlpha = 0.55; ctx.beginPath(); ctx.moveTo(-s*0.4, s*0.28); ctx.lineTo(s*0.4, s*0.28); ctx.lineTo(s*0.6, s*0.6); ctx.lineTo(-s*0.6, s*0.6); ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1;
    } else if (key === 'val') {          // checkmark in ring
      ctx.beginPath(); ctx.arc(0, 0, s*0.72, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-s*0.33, s*0.02); ctx.lineTo(-s*0.08, s*0.3); ctx.lineTo(s*0.38, -s*0.28); ctx.stroke();
    }
    ctx.restore();
  }

  function fourPointStar(x, y, r, col, a) {
    ctx.save(); ctx.translate(x, y); ctx.globalAlpha = a; ctx.fillStyle = col;
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const ang = i * Math.PI / 4; const rad = i % 2 === 0 ? r : r * 0.4;
      const px = Math.cos(ang) * rad, py = Math.sin(ang) * rad;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill(); ctx.restore();
  }

  function physics() {
    // spring each node back to its ring home; light repulsion for a lively feel
    nodes.forEach(n => {
      if (n === dragging) return;
      n.vx += (n.hx - n.x) * 0.02;
      n.vy += (n.hy - n.y) * 0.02;
      n.vx *= 0.86; n.vy *= 0.86;
      n.x += n.vx; n.y += n.vy;
    });
    // packets advance around the loop
    packets.forEach(pk => {
      pk.p += 0.006;
      const seg = Math.floor(pk.p) % N;
      pk.color = nodes[(seg + 1) % N].color;    // morph toward the next stage
      if (pk.p >= N) {                            // completed a full validated cycle
        pk.p -= N;
        emitDiscovery();
      }
    });
    if (packets.length > 6) packets = packets.slice(-6);

    // flyers travel from Validation node to the core, then settle into orbit
    flyers.forEach(f => {
      f.t += 0.03;
      if (f.t >= 1) { f.done = true; settleDiscovery(f.color); }
    });
    flyers = flyers.filter(f => !f.done);

    discoveries.forEach(d => { d.a += d.spd; if (d.fade < 1) d.fade += 0.02; });
    if (discoveries.length > 14) { discoveries[0].fade = -1; }
    discoveries = discoveries.filter(d => d.fade >= 0);
  }

  function emitDiscovery() {
    const val = nodes[3];
    flyers.push({ x0: val.x, y0: val.y, color: val.color, t: 0 });
  }
  function settleDiscovery(color) {
    discCount++;
    discoveries.push({ a: Math.random() * Math.PI * 2, rad: CORE_R + 12 + (discoveries.length % 3) * 9,
                       spd: 0.004 + Math.random() * 0.004, color, fade: 0 });
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    // subtle vignette background
    const g = ctx.createRadialGradient(CX, CY, 40, CX, CY, W * 0.62);
    g.addColorStop(0, isDark ? '#151b30' : '#ffffff');
    g.addColorStop(1, bg());
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // --- directed loop path between consecutive stages (with flow + arrowheads) ---
    for (let i = 0; i < N; i++) {
      const a = nodes[i], b = nodes[(i + 1) % N];
      const dx = b.x - a.x, dy = b.y - a.y, d = Math.hypot(dx, dy) || 1;
      const ux = dx / d, uy = dy / d;
      const sx = a.x + ux * a.r, sy = a.y + uy * a.r;
      const ex = b.x - ux * b.r, ey = b.y - uy * b.r;
      const pulse = animate ? (Math.sin(time * 2 + i) + 1) / 2 : 0.5;

      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
      ctx.strokeStyle = isDark ? withA('#93a4c8', 0.16 + pulse * 0.16) : withA('#475569', 0.14 + pulse * 0.14);
      ctx.lineWidth = 1.6 + pulse * 1.6; ctx.stroke();

      // arrowhead near the destination — encodes flow direction
      const ax = ex - ux * 12, ay = ey - uy * 12, nxp = -uy, nyp = ux;
      ctx.beginPath(); ctx.moveTo(ex, ey);
      ctx.lineTo(ax + nxp * 5, ay + nyp * 5); ctx.lineTo(ax - nxp * 5, ay - nyp * 5); ctx.closePath();
      ctx.fillStyle = isDark ? withA('#93a4c8', 0.4) : withA('#475569', 0.4); ctx.fill();

      // ambient flow dots even with no packets, so the cycle reads as "always running"
      if (animate) for (let p = 0; p < 2; p++) {
        const t = ((time * 0.16 + p * 0.5 + i * 0.25) % 1);
        const px = lerp(sx, ex, t), py = lerp(sy, ey, t);
        fourPointStar(px, py, 2.4, b.color, 0.5);
      }
    }

    // --- travelling artifacts (packets) ---
    packets.forEach(pk => {
      const seg = Math.floor(pk.p) % N, t = pk.p - Math.floor(pk.p);
      const a = nodes[seg], b = nodes[(seg + 1) % N];
      const px = lerp(a.x, b.x, t), py = lerp(a.y, b.y, t);
      const glow = ctx.createRadialGradient(px, py, 0, px, py, 12);
      glow.addColorStop(0, withA(pk.color, 0.9)); glow.addColorStop(1, withA(pk.color, 0));
      ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(px, py, 12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = lighten(pk.color, 40); ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI * 2); ctx.fill();
    });

    // --- knowledge core (accumulated discoveries) ---
    const corePulse = animate ? (Math.sin(time * 1.4) + 1) / 2 : 0.5;
    const cg = ctx.createRadialGradient(CX, CY, 4, CX, CY, CORE_R);
    cg.addColorStop(0, isDark ? '#25335c' : '#e7eefb');
    cg.addColorStop(1, isDark ? '#141a2e' : '#f2f6fd');
    ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(CX, CY, CORE_R, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = withA('#6366f1', 0.35 + corePulse * 0.35); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(CX, CY, CORE_R, 0, Math.PI * 2); ctx.stroke();

    // orbiting discovered results
    discoveries.forEach(d => {
      const dx = CX + Math.cos(d.a) * d.rad, dy = CY + Math.sin(d.a) * d.rad;
      fourPointStar(dx, dy, 3.4, d.color, Math.max(0, Math.min(1, d.fade)));
    });

    ctx.fillStyle = fg(); ctx.textAlign = 'center';
    ctx.font = '700 20px ui-sans-serif, system-ui, sans-serif';
    ctx.fillText(String(discCount), CX, CY - 1);
    ctx.font = '600 9.5px ui-sans-serif, system-ui, sans-serif';
    ctx.fillStyle = mut();
    ctx.fillText('DISCOVERIES', CX, CY + 14);

    // flyers: validated result streaking into the core
    flyers.forEach(f => {
      const t = f.t, ease = t * t * (3 - 2 * t);
      const fx = lerp(f.x0, CX, ease), fy = lerp(f.y0, CY, ease);
      ctx.strokeStyle = withA(f.color, 0.5 * (1 - t)); ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(lerp(f.x0, CX, Math.max(0, ease - 0.12)), lerp(f.y0, CY, Math.max(0, ease - 0.12))); ctx.lineTo(fx, fy); ctx.stroke();
      fourPointStar(fx, fy, 5 - t * 2, f.color, 1);
    });

    // --- stage nodes ---
    nodes.forEach((n, i) => {
      const bob = animate ? Math.sin(time * 1.6 + i * 1.3) * 2.5 : 0;
      const y = n.y + bob;
      const held = dragging === n, hov = hoverNode === n;

      ctx.beginPath(); ctx.arc(n.x, y + 5, n.r, 0, Math.PI * 2);
      ctx.fillStyle = isDark ? 'rgba(0,0,0,0.35)' : 'rgba(30,41,59,0.14)'; ctx.fill();

      if (held || hov) {
        ctx.beginPath(); ctx.arc(n.x, y, n.r + 9, 0, Math.PI * 2);
        ctx.fillStyle = withA(n.color, 0.22); ctx.fill();
      }

      ctx.beginPath(); ctx.arc(n.x, y, n.r + (held ? 3 : 0), 0, Math.PI * 2);
      const rg = ctx.createRadialGradient(n.x - 9, y - 9, 4, n.x, y, n.r + 4);
      rg.addColorStop(0, isDark ? '#20263c' : '#ffffff'); rg.addColorStop(1, isDark ? '#171c2e' : '#eef2fb');
      ctx.fillStyle = rg; ctx.fill();
      ctx.strokeStyle = n.color; ctx.lineWidth = 2.4; ctx.stroke();

      icon(n.key, n.x, y, 15, n.color);

      ctx.font = '700 12px ui-sans-serif, system-ui, sans-serif';
      ctx.fillStyle = fg(); ctx.textAlign = 'center';
      ctx.fillText(n.name, n.x, y + n.r + 16);
    });

    // index badge — reads as an ordered pipeline
    nodes.forEach((n, i) => {
      const bob = animate ? Math.sin(time * 1.6 + i * 1.3) * 2.5 : 0;
      const bx = n.x + n.r * 0.72, by = n.y + bob - n.r * 0.72;
      ctx.beginPath(); ctx.arc(bx, by, 9, 0, Math.PI * 2); ctx.fillStyle = n.color; ctx.fill();
      ctx.font = '700 11px ui-sans-serif, system-ui, sans-serif'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(String(i + 1), bx, by + 0.5);
      ctx.textBaseline = 'alphabetic';
    });
  }

  function loop() {
    if (!animate) return;
    time += 0.016;
    spawnT += 0.016;
    if (spawnT > 3.4 && packets.length < 3) { spawnPacket(0); spawnT = 0; }
    physics();
    render();
    requestAnimationFrame(loop);
  }

  // --- interaction ---
  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - r.left) * (W / r.width), y: (t.clientY - r.top) * (H / r.height), cx: t.clientX, cy: t.clientY };
  }
  function hit(p) {
    for (let i = nodes.length - 1; i >= 0; i--) if (dist(p, nodes[i]) < nodes[i].r + 6) return nodes[i];
    return null;
  }
  function showTip(n, cx, cy) {
    tooltip.innerHTML = '<strong>' + n.name + ' Agent</strong><br>' + n.role;
    tooltip.style.left = Math.min(cx + 14, window.innerWidth - 236) + 'px';
    tooltip.style.top = (cy + 16) + 'px';
    tooltip.style.opacity = '1';
  }
  function hideTip() { tooltip.style.opacity = '0'; }

  let downPos = null, moved = false;
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    const p = pos(e), n = hit(p);
    downPos = p; moved = false;
    if (n) { dragging = n; dragDX = n.x - p.x; dragDY = n.y - p.y; canvas.style.cursor = 'grabbing'; }
  });
  canvas.addEventListener('pointermove', e => {
    const p = pos(e);
    if (dragging) {
      e.preventDefault();
      dragging.x = p.x + dragDX; dragging.y = p.y + dragDY; dragging.vx = 0; dragging.vy = 0;
      if (downPos && Math.hypot(p.x - downPos.x, p.y - downPos.y) > 5) moved = true;
      if (!animate) render();
    } else {
      const n = hit(p);
      hoverNode = n;
      canvas.style.cursor = n ? 'grab' : 'default';
      if (n) showTip(n, p.cx, p.cy); else hideTip();
      if (!animate) render();
    }
  });
  function release(e) {
    if (dragging && !moved) {                 // a click (not a drag) launches a research thread from that stage
      const idx = nodes.indexOf(dragging);
      spawnPacket(idx);
      if (!animate) { physics(); render(); }
    }
    dragging = null; canvas.style.cursor = hoverNode ? 'grab' : 'default';
  }
  canvas.addEventListener('pointerup', release);
  canvas.addEventListener('pointerleave', () => { dragging = null; hoverNode = null; hideTip(); canvas.style.cursor = 'grab'; if (!animate) render(); });

  window.addEventListener('resize', () => { fit(); if (!animate) render(); });

  // seed a couple of discoveries so the core isn't empty on first paint
  spawnPacket(0);
  settleDiscovery(nodes[1].color); settleDiscovery(nodes[2].color);
  if (animate) loop(); else render();
})();
</script>
