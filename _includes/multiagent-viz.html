<div id="multiagent-section" style="margin: 30px 0;">
<h2 style="margin-bottom: 4px;">How Multi-Agent Systems Collaborate</h2>
<p style="margin-top: 0; color: #888; font-size: 0.95em;">Drag agents to fling them! Double-click empty space to spawn a Task node.</p>

<canvas id="ma-canvas" width="800" height="450" style="width: 100%; max-width: 800px; border-radius: 12px; cursor: grab; touch-action: none;"></canvas>
</div>

<script>
(function() {
  const canvas = document.getElementById('ma-canvas');
  const ctx = canvas.getContext('2d');
  let W = canvas.width, H = canvas.height;
  let isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => { isDark = e.matches; });

  const AGENTS = [
    { name: 'Planner', emoji: '\u{1F4CB}', color: '#f59e0b', desc: 'Decomposes tasks' },
    { name: 'Researcher', emoji: '\u{1F50D}', color: '#10b981', desc: 'Gathers info' },
    { name: 'Coder', emoji: '\u{1F4BB}', color: '#3b82f6', desc: 'Writes code' },
    { name: 'Reviewer', emoji: '\u{1F9D0}', color: '#8b5cf6', desc: 'Reviews output' },
    { name: 'Debugger', emoji: '\u{1F41B}', color: '#ef4444', desc: 'Fixes issues' },
    { name: 'Executor', emoji: '\u{26A1}', color: '#06b6d4', desc: 'Runs code' },
  ];

  const EDGES = [[0,1],[0,2],[1,2],[2,3],[3,4],[4,5],[5,2],[0,5],[1,3],[3,5]];

  let nodes = [];
  let tempNodes = [];
  let dragging = null;
  let dragOffX = 0, dragOffY = 0;
  let time = 0;

  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function bg() { return isDark ? '#1a1a2e' : '#f8f9fc'; }
  function fg() { return isDark ? '#e0e0e0' : '#333'; }

  function lighten(hex, pct) {
    let r = parseInt(hex.slice(1, 3), 16);
    let g = parseInt(hex.slice(3, 5), 16);
    let b = parseInt(hex.slice(5, 7), 16);
    r = Math.min(255, r + pct);
    g = Math.min(255, g + pct);
    b = Math.min(255, b + pct);
    return `rgb(${r},${g},${b})`;
  }

  function init() {
    nodes = AGENTS.map((a, i) => ({
      x: W * 0.2 + Math.random() * W * 0.6,
      y: H * 0.2 + Math.random() * H * 0.6,
      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() - 0.5) * 2,
      r: 30, ...a
    }));
    tempNodes = [];
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = bg();
    ctx.fillRect(0, 0, W, H);
    time += 0.016;

    const allNodes = nodes.concat(tempNodes);

    // repulsion
    for (let i = 0; i < allNodes.length; i++) {
      for (let j = i + 1; j < allNodes.length; j++) {
        const a = allNodes[i], b = allNodes[j];
        let dx = b.x - a.x, dy = b.y - a.y;
        let d = Math.hypot(dx, dy);
        if (d < 1) d = 1;
        const force = 800 / (d * d);
        const fx = (dx / d) * force, fy = (dy / d) * force;
        if (a !== dragging) { a.vx -= fx; a.vy -= fy; }
        if (b !== dragging) { b.vx += fx; b.vy += fy; }
      }
    }

    // spring edges
    EDGES.forEach(([a, b]) => {
      const na = nodes[a], nb = nodes[b];
      const dx = nb.x - na.x, dy = nb.y - na.y;
      const d = Math.hypot(dx, dy);
      const force = (d - 120) * 0.005;
      const fx = (dx / d) * force, fy = (dy / d) * force;
      if (na !== dragging) { na.vx += fx; na.vy += fy; }
      if (nb !== dragging) { nb.vx -= fx; nb.vy -= fy; }
    });

    // temp nodes attracted to nearest agent
    tempNodes.forEach(tn => {
      let minD = Infinity, nearest = nodes[0];
      nodes.forEach(n => { const d = dist(tn, n); if (d < minD) { minD = d; nearest = n; } });
      const dx = nearest.x - tn.x, dy = nearest.y - tn.y;
      const d = Math.hypot(dx, dy);
      if (d > 1) { tn.vx += (dx / d) * 0.3; tn.vy += (dy / d) * 0.3; }
      tn.life -= 0.005;
    });
    tempNodes = tempNodes.filter(t => t.life > 0);

    // center gravity + integrate
    allNodes.forEach(n => {
      if (n === dragging) return;
      n.vx += (W / 2 - n.x) * 0.0005;
      n.vy += (H / 2 - n.y) * 0.0005;
      n.vx *= 0.95; n.vy *= 0.95;
      n.x += n.vx; n.y += n.vy;
      if (n.x < n.r) { n.x = n.r; n.vx *= -0.7; }
      if (n.x > W - n.r) { n.x = W - n.r; n.vx *= -0.7; }
      if (n.y < n.r) { n.y = n.r; n.vy *= -0.7; }
      if (n.y > H - n.r) { n.y = H - n.r; n.vy *= -0.7; }
    });

    // collision
    for (let i = 0; i < allNodes.length; i++) {
      for (let j = i + 1; j < allNodes.length; j++) {
        const a = allNodes[i], b = allNodes[j];
        const d = dist(a, b), minD2 = a.r + b.r;
        if (d < minD2 && d > 0) {
          const overlap = (minD2 - d) / 2;
          const dx = (b.x - a.x) / d, dy = (b.y - a.y) / d;
          if (a !== dragging) { a.x -= dx * overlap; a.y -= dy * overlap; }
          if (b !== dragging) { b.x += dx * overlap; b.y += dy * overlap; }
        }
      }
    }

    // draw edges with pulse
    EDGES.forEach(([a, b]) => {
      const na = nodes[a], nb = nodes[b];
      const pulse = (Math.sin(time * 2 + a + b) + 1) / 2;
      ctx.beginPath();
      ctx.moveTo(na.x, na.y); ctx.lineTo(nb.x, nb.y);
      ctx.strokeStyle = isDark ? `rgba(255,255,255,${0.1 + pulse * 0.15})` : `rgba(0,0,0,${0.08 + pulse * 0.12})`;
      ctx.lineWidth = 1.5 + pulse * 2.5;
      ctx.stroke();
      for (let p = 0; p < 2; p++) {
        const pt = ((time * 0.4 + p * 0.5 + a * 0.1) % 1);
        const px = lerp(na.x, nb.x, pt), py = lerp(na.y, nb.y, pt);
        ctx.beginPath(); ctx.arc(px, py, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = na.color; ctx.globalAlpha = 0.5; ctx.fill(); ctx.globalAlpha = 1;
      }
    });

    // draw temp-node connections
    tempNodes.forEach(tn => {
      nodes.forEach(n => {
        const d = dist(tn, n);
        if (d < 150) {
          ctx.beginPath(); ctx.moveTo(tn.x, tn.y); ctx.lineTo(n.x, n.y);
          ctx.strokeStyle = isDark ? `rgba(251,191,36,${(1 - d / 150) * 0.3 * tn.life})` : `rgba(251,191,36,${(1 - d / 150) * 0.4 * tn.life})`;
          ctx.lineWidth = 1.5; ctx.stroke();
        }
      });
    });

    // draw temp nodes
    tempNodes.forEach(tn => {
      const bounce = Math.sin(time * 4) * 2;
      ctx.beginPath(); ctx.arc(tn.x, tn.y + bounce, tn.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(251,191,36,${tn.life * 0.8})`;
      ctx.shadowColor = '#fbbf24'; ctx.shadowBlur = 10 * tn.life; ctx.fill(); ctx.shadowBlur = 0;
      ctx.font = '14px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.globalAlpha = tn.life; ctx.fillText('\u{1F4E6}', tn.x, tn.y + bounce);
      ctx.font = '9px sans-serif'; ctx.fillStyle = fg(); ctx.fillText('Task', tn.x, tn.y + bounce + tn.r + 10);
      ctx.globalAlpha = 1;
    });

    // draw agent nodes
    nodes.forEach((n, i) => {
      const bounce = Math.sin(time * 1.8 + i * 1.1) * 3;
      const isHeld = dragging === n;

      ctx.beginPath(); ctx.arc(n.x, n.y + bounce + 5, n.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fill();

      if (isHeld) {
        ctx.beginPath(); ctx.arc(n.x, n.y + bounce, n.r + 8, 0, Math.PI * 2);
        ctx.fillStyle = n.color; ctx.globalAlpha = 0.25; ctx.fill(); ctx.globalAlpha = 1;
      }

      ctx.beginPath(); ctx.arc(n.x, n.y + bounce, n.r + (isHeld ? 3 : 0), 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(n.x - 8, n.y + bounce - 8, 4, n.x, n.y + bounce, n.r);
      grad.addColorStop(0, lighten(n.color, 30)); grad.addColorStop(1, n.color);
      ctx.fillStyle = grad; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2; ctx.stroke();

      ctx.font = '20px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(n.emoji, n.x, n.y + bounce - 1);

      ctx.font = 'bold 11px sans-serif'; ctx.fillStyle = fg();
      ctx.fillText(n.name, n.x, n.y + bounce + n.r + 14);
    });

    requestAnimationFrame(draw);
  }

  // --- Interaction ---
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - rect.left) * (W / rect.width), y: (t.clientY - rect.top) * (H / rect.height) };
  }

  function findNode(pos) {
    const all = nodes.concat(tempNodes);
    for (let i = all.length - 1; i >= 0; i--) {
      if (dist(pos, all[i]) < all[i].r + 8) return all[i];
    }
    return null;
  }

  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    const pos = getPos(e), node = findNode(pos);
    if (node) { dragging = node; dragOffX = node.x - pos.x; dragOffY = node.y - pos.y; canvas.style.cursor = 'grabbing'; }
  });
  canvas.addEventListener('pointermove', e => {
    e.preventDefault();
    const pos = getPos(e);
    if (dragging) { dragging.x = pos.x + dragOffX; dragging.y = pos.y + dragOffY; dragging.vx = 0; dragging.vy = 0; }
    else { canvas.style.cursor = findNode(pos) ? 'grab' : 'default'; }
  });
  canvas.addEventListener('pointerup', () => { dragging = null; canvas.style.cursor = 'grab'; });
  canvas.addEventListener('pointerleave', () => { dragging = null; canvas.style.cursor = 'grab'; });
  canvas.addEventListener('dblclick', e => {
    const pos = getPos(e);
    if (!findNode(pos)) { tempNodes.push({ x: pos.x, y: pos.y, vx: 0, vy: 0, r: 16, life: 1.0, name: 'Task', emoji: '\u{1F4E6}', color: '#fbbf24' }); }
  });

  init();
  requestAnimationFrame(draw);
})();
</script>
