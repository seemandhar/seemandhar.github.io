<p style="margin-top:4px;color:#888;font-size:14.5px;">A few moments with the people who shaped the journey.</p>

<style>
.photo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin:18px 0 10px;}
.photo-card{position:relative;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);text-decoration:none;color:inherit;display:block;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s ease;}
.photo-card:hover{transform:translateY(-6px) scale(1.01);box-shadow:0 12px 32px rgba(0,0,0,0.16);}
.photo-card img{width:100%;height:236px;object-fit:cover;display:block;

.photo-card:hover img{transform:scale(1.05);filter:brightness(1.04);}
.photo-card .ph-cap{position:absolute;left:0;right:0;bottom:0;padding:28px 12px 10px;
  background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,0.74));color:#fff;
  font-size:13.5px;font-weight:600;letter-spacing:0.01em;line-height:1.35;}
.photo-card .ph-cap small{display:block;font-weight:400;font-size:11.5px;opacity:0.85;}
@media(min-width:640px){
  .photo-grid{grid-template-columns:repeat(3,1fr);}
  .photo-card.tall{grid-row:span 2;}
  .photo-card.tall img{height:100%;min-height:488px;}
}
</style>
